apiVersion: apps/v1
kind: Deployment
metadata:
  name: mealie
  namespace: mealie
  labels:
    app.kubernetes.io/name: mealie
    app.kubernetes.io/instance: mealie
    app.kubernetes.io/part-of: homelab
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mealie
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mealie
        app.kubernetes.io/instance: mealie
        app.kubernetes.io/part-of: homelab
    spec:
      securityContext:
        fsGroup: 911
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: mealie
          image: hkotel/mealie:v3.12.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 9000
          env:
            - name: TZ
              value: UTC
            - name: BASE_URL
              value: https://mealie.jellylabs.xyz
            - name: ALLOW_SIGNUP
              value: "false"
            - name: DB_ENGINE
              value: postgres
            - name: POSTGRES_SERVER
              value: mealie-db-production-cnpg-v1-rw.mealie.svc.cluster.local
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              value: mealie
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: mealie-db-app-credentials
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mealie-db-app-credentials
                  key: password
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: mealie-secrets
                  key: OPENAI_API_KEY
                  optional: true
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: mealie-data
              mountPath: /app/data
          startupProbe:
            tcpSocket:
              port: http
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: http
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            privileged: false
            readOnlyRootFilesystem: false
            runAsGroup: 911
            runAsNonRoot: true
            runAsUser: 911
      volumes:
        - name: mealie-data
          persistentVolumeClaim:
            claimName: mealie-data
