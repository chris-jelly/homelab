apiVersion: v1
kind: ConfigMap
metadata:
  name: mealie-backup-script
  namespace: mealie
  labels:
    app.kubernetes.io/name: mealie
    app.kubernetes.io/component: backup
    app.kubernetes.io/part-of: homelab
data:
  backup.sh: |
    #!/bin/bash
    set -euo pipefail

    echo "========================================="
    echo "Mealie /app/data backup started"
    echo "Timestamp: $(date -u +%Y-%m-%d_%H-%M-%S)"
    echo "========================================="

    TIMESTAMP=$(date -u +%Y-%m-%d_%H-%M-%S)
    BACKUP_FILE="${BACKUP_PREFIX}-${TIMESTAMP}.tar.gz"
    TEMP_BACKUP="/tmp/${BACKUP_FILE}"
    DESTINATION_URL="${BACKUP_DESTINATION_URL%/}/${BACKUP_FILE}"

    echo "Creating compressed archive of /app-data..."
    cd /app-data
    tar -czf "${TEMP_BACKUP}" .

    BACKUP_SIZE=$(du -h "${TEMP_BACKUP}" | cut -f1)
    echo "Backup archive created: ${BACKUP_FILE} (${BACKUP_SIZE})"

    echo "Uploading backup to Azure Blob Storage..."
    azcopy copy "${TEMP_BACKUP}" "${DESTINATION_URL}" --put-md5 --overwrite=false

    echo "Upload successful: ${BACKUP_FILE}"

    echo "Cleaning up old backups (keeping last ${BACKUP_RETENTION_COUNT})..."
    LIST_OUTPUT="/tmp/azcopy-list.jsonl"
    PRUNE_LIST="/tmp/azcopy-prune-list.txt"

    azcopy list "${BACKUP_DESTINATION_URL}" \
      --properties "LastModifiedTime" \
      --machine-readable \
      --output-type json > "${LIST_OUTPUT}"

    python3 - <<'PY' > "${PRUNE_LIST}"
    import json
    import os

    backup_prefix = os.environ["BACKUP_PREFIX"] + "-"
    keep = int(os.environ["BACKUP_RETENTION_COUNT"])
    list_output = "/tmp/azcopy-list.jsonl"

    entries = []
    with open(list_output, encoding="utf-8") as handle:
        for line in handle:
            line = line.strip()
            if not line:
                continue
            outer = json.loads(line)
            if outer.get("MessageType") != "ListObject":
                continue
            inner = json.loads(outer["MessageContent"])
            path = inner.get("Path", "")
            name = path.rsplit("/", 1)[-1]
            if not name.startswith(backup_prefix):
                continue
            entries.append((inner.get("LastModifiedTime", ""), path))

    entries.sort(reverse=True)
    for _, path in entries[keep:]:
        print(path)
    PY

    if [ -s "${PRUNE_LIST}" ]; then
      while read -r OLD_BACKUP; do
        if [ -n "${OLD_BACKUP}" ]; then
          echo "Deleting old backup: ${OLD_BACKUP}"
        fi
      done < "${PRUNE_LIST}"

      azcopy remove "${BACKUP_DESTINATION_URL}" \
        --recursive=true \
        --list-of-files "${PRUNE_LIST}"
    fi

    echo ""
    echo "Current backups in storage:"
    azcopy list "${BACKUP_DESTINATION_URL}" \
      --properties "LastModifiedTime" \
      --machine-readable

    rm -f "${TEMP_BACKUP}" "${LIST_OUTPUT}" "${PRUNE_LIST}"

    echo ""
    echo "========================================="
    echo "Backup completed successfully!"
    echo "========================================="
