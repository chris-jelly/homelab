apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mealie
  namespace: mealie
  labels:
    app.kubernetes.io/name: mealie
    app.kubernetes.io/instance: mealie
    app.kubernetes.io/part-of: homelab
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: Applications
    gethomepage.dev/name: Mealie
    gethomepage.dev/icon: mdi-silverware-fork-knife
    gethomepage.dev/description: Recipe manager, meal planner, and shopping lists
    gethomepage.dev/pod-selector: app.kubernetes.io/name=mealie
    gethomepage.dev/weight: "15"
spec:
  ingressClassName: traefik
  rules:
    - host: mealie.jellylabs.xyz
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mealie
                port:
                  number: 9000
  tls:
    - hosts:
        - mealie.jellylabs.xyz
      secretName: mealie-tls
