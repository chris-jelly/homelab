apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: sales-pipeline-pulse-secrets
  namespace: streamlit
  labels:
    app.kubernetes.io/name: sales-pipeline-pulse
    app.kubernetes.io/instance: sales-pipeline-pulse
    app.kubernetes.io/part-of: homelab
spec:
  secretStoreRef:
    name: kubernetes-warehouse
    kind: SecretStore
  target:
    name: sales-pipeline-pulse-secrets
    creationPolicy: Owner
    template:
      data:
        SALES_WAREHOUSE_URL: postgresql+psycopg://warehouse_streamlit_reader_prod:{{ .password | urlquery }}@warehouse-db-production-cnpg-v1-rw.warehouse:5432/app
  data:
    - secretKey: password
      remoteRef:
        key: warehouse-streamlit-reader-credentials
        property: password
