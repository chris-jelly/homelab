apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: warehouse-streamlit-reader-password
  namespace: warehouse
spec:
  length: 40
  digits: 8
  symbols: 8
  symbolCharacters: "-_"
  noUpper: false
  allowRepeat: true
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: warehouse-streamlit-reader-credentials
  namespace: warehouse
spec:
  refreshInterval: 1h
  target:
    name: warehouse-streamlit-reader-credentials
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        username: warehouse_streamlit_reader_prod
        password: "{{ .password }}"
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: warehouse-streamlit-reader-password
