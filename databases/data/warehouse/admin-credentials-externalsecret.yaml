apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: warehouse-admin-credentials
  namespace: warehouse
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-kv-store
    kind: ClusterSecretStore
  target:
    name: warehouse-admin-credentials
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        username: warehouse_admin_prod
  data:
    - secretKey: password
      remoteRef:
        key: secret/warehouse-admin-password-prod
