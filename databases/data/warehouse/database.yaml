apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: warehouse-db-production-cnpg-v1
  namespace: warehouse
spec:
  description: "Postgres cluster for data engineering airflow/dbt/analytics projects"
  imageName: ghcr.io/cloudnative-pg/postgresql:13
  instances: 1
  managed:
    roles:
      - name: warehouse_airflow_reader_prod
        ensure: present
        login: true
        inherit: true
        superuser: false
        createdb: false
        createrole: false
      - name: warehouse_streamlit_reader_prod
        ensure: present
        login: true
        inherit: true
        superuser: false
        createdb: false
        createrole: false
      - name: warehouse_admin_prod
        ensure: present
        login: true
        inherit: true
        superuser: false
        createdb: false
        createrole: false
        passwordSecret:
          name: warehouse-admin-credentials

  inheritedMetadata: 
    labels:
      app: warehouse-database
      policy-type: "database"
    
  # TODO: Uncomment this when we have the resouces to run kube-prometheus-stack
  #monitoring:
    #enabledpodMonitor: true
  
  storage: 
    size: 1Gi
 
