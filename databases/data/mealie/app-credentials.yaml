apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: mealie-db-app-password
  namespace: mealie
spec:
  length: 40
  digits: 8
  symbols: 8
  symbolCharacters: "-_"
  noUpper: false
  allowRepeat: true
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mealie-db-app-credentials
  namespace: mealie
spec:
  refreshInterval: 0s
  target:
    name: mealie-db-app-credentials
    creationPolicy: Owner
    template:
      metadata:
        labels:
          cnpg.io/reload: "true"
      type: kubernetes.io/basic-auth
      data:
        username: mealie
        password: "{{ .password }}"
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: mealie-db-app-password
