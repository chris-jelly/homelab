apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: mealie-db-production-cnpg-v1
  namespace: mealie
spec:
  description: "Postgres cluster for Mealie"
  imageName: ghcr.io/cloudnative-pg/postgresql:15
  instances: 1
  serviceAccountTemplate:
    metadata:
      name: mealie-backup
      annotations:
        azure.workload.identity/client-id: b5770047-281b-400e-9275-9cf9580654df
  bootstrap:
    initdb:
      database: mealie
      owner: mealie
      secret:
        name: mealie-db-app-credentials
  inheritedMetadata:
    labels:
      app: mealie-database
      policy-type: database
      app.kubernetes.io/part-of: homelab
      azure.workload.identity/use: "true"
  storage:
    size: 8Gi
  backup:
    barmanObjectStore:
      destinationPath: https://sthomelabbackups.blob.core.windows.net/mealie/db/
      azureCredentials:
        useDefaultAzureCredentials: true
      wal:
        compression: gzip
      data:
        compression: gzip
    retentionPolicy: "30d"
